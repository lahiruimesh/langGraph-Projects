name: CareerSpy AI Daily Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Google Chrome & Playwright Dependencies
      run: |
        pip install playwright
        playwright install --with-deps chromium

    - name: Install Project Requirements
      run: |
        pip install -r requirements.txt

    # 💡 100%ක්ම ආරක්ෂිතව, JSON එක කැඩෙන්නෙ නැතුව credentials.json එක හදන සුපිරිම ක්‍රමය මචං
    - name: Create credentials.json from GitHub Secrets
      run: |
        cat << 'EOF' > credentials.json
        ${{ secrets.GCP_CREDENTIALS_JSON }}
        EOF

    # 🚀 ඇප් එක රන් කිරීම
    - name: Execute CareerSpy Autonomous Agent
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
      run: python main.py

    